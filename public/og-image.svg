<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="ogGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a088;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#151520;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="200" fill="#00d4aa" opacity="0.05"/>
  <circle cx="1100" cy="530" r="300" fill="#00d4aa" opacity="0.03"/>
  <!-- Book icon -->
  <path d="M200 150 Q 200 130 220 130 L 400 130 Q 420 130 420 150 L 420 480 Q 420 500 400 500 L 220 500 Q 200 500 200 480 Z" fill="none" stroke="url(#ogGradient)" stroke-width="12"/>
  <path d="M420 130 L 600 130 Q 620 130 620 150 L 620 480 Q 620 500 600 500 L 420 500" fill="none" stroke="url(#ogGradient)" stroke-width="12"/>
  <path d="M420 130 L 420 500" stroke="url(#ogGradient)" stroke-width="12"/>
  <!-- Main content -->
  <text x="700" y="280" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="url(#ogGradient)" text-anchor="middle">MangaFlow</text>
  <text x="700" y="360" font-family="Arial, sans-serif" font-size="36" fill="#ffffff" text-anchor="middle">Leggi manga online gratis</text>
  <text x="700" y="420" font-family="Arial, sans-serif" font-size="24" fill="#888888" text-anchor="middle">MangaWorld • MangaDex • MangaLife • e altro ancora</text>
  <!-- Call to action -->
  <rect x="600" y="480" width="200" height="50" rx="25" fill="url(#ogGradient)"/>
  <text x="700" y="515" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0a0a0f" text-anchor="middle">Inizia a leggere</text>
</svg>