<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a88a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="url(#logo-gradient)" stroke-width="3"/>

  <!-- Book icon -->
  <g transform="translate(50, 45)">
    <!-- Left page -->
    <path d="M 0,20 Q 20,10 40,20 L 40,100 Q 20,90 0,100 Z" fill="#2a2a3e" stroke="url(#logo-gradient)" stroke-width="2"/>
    <!-- Right page -->
    <path d="M 40,20 Q 60,10 80,20 L 80,100 Q 60,90 40,100 Z" fill="#3a3a4e" stroke="url(#logo-gradient)" stroke-width="2"/>
    <!-- Spine -->
    <line x1="40" y1="20" x2="40" y2="100" stroke="url(#logo-gradient)" stroke-width="2"/>

    <!-- Manga pages lines -->
    <line x1="10" y1="35" x2="30" y2="35" stroke="#4a4a5e" stroke-width="1"/>
    <line x1="10" y1="45" x2="30" y2="45" stroke="#4a4a5e" stroke-width="1"/>
    <line x1="10" y1="55" x2="25" y2="55" stroke="#4a4a5e" stroke-width="1"/>

    <line x1="50" y1="35" x2="70" y2="35" stroke="#4a4a5e" stroke-width="1"/>
    <line x1="50" y1="45" x2="70" y2="45" stroke="#4a4a5e" stroke-width="1"/>
    <line x1="50" y1="55" x2="65" y2="55" stroke="#4a4a5e" stroke-width="1"/>
  </g>

  <!-- Flow waves -->
  <g transform="translate(45, 115)" filter="url(#glow)">
    <path d="M 0,30 Q 25,15 50,30 T 100,30" fill="none" stroke="url(#logo-gradient)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 0,40 Q 25,25 50,40 T 100,40" fill="none" stroke="url(#logo-gradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
