<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POKÉMONA - Edizione Italiana</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        body {
            background: #1a1a2e;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            touch-action: none;
            padding: 0;
        }
        
        /* Focus overlay */
        #focus-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        #focus-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        #focus-overlay .play-btn {
            width: 100px;
            height: 100px;
            border: 4px solid #ff6b35;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            background: linear-gradient(145deg, rgba(255,107,53,0.3), rgba(255,107,53,0.1));
            animation: pulse 2s infinite;
        }
        
        #focus-overlay .play-btn::after {
            content: '▶';
            font-size: 32px;
            color: #ff6b35;
            margin-left: 8px;
        }
        
        #focus-overlay h2 {
            color: #ff6b35;
            font-size: 14px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #000;
            text-align: center;
            padding: 0 15px;
        }
        
        #focus-overlay p {
            color: #aaa;
            font-size: 8px;
            animation: blink 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        
        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding-top: env(safe-area-inset-top, 0);
        }
        
        #game-container {
            position: relative;
            background: #000;
            border: 3px solid #ff6b35;
            border-radius: 6px;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
            overflow: hidden;
            flex-shrink: 0;
        }
        
        #game-canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* UI Overlays */
        .ui-overlay {
            position: absolute;
            pointer-events: none;
        }
        
        .ui-overlay.active {
            pointer-events: auto;
        }
        
        #title-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #87CEEB 0%, #98FB98 50%, #90EE90 100%);
            z-index: 100;
            cursor: pointer;
        }
        
        .title-logo {
            font-size: clamp(20px, 8vw, 36px);
            font-weight: bold;
            color: #ff6b35;
            text-shadow: 
                3px 3px 0 #c44d22,
                -2px -2px 0 #ffaa80;
            letter-spacing: 2px;
            animation: logoFloat 3s ease-in-out infinite;
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .title-subtitle {
            font-size: clamp(7px, 2.5vw, 9px);
            color: #333;
            margin-top: 10px;
            background: rgba(255,255,255,0.9);
            padding: 6px 15px;
            border-radius: 15px;
            border: 2px solid #333;
        }
        
        .title-menu {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .title-menu-item {
            font-size: clamp(9px, 3vw, 12px);
            color: #333;
            background: rgba(255,255,255,0.9);
            padding: 10px 25px;
            border-radius: 6px;
            border: 2px solid #333;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .title-menu-item:hover, .title-menu-item.selected {
            background: #ff6b35;
            color: white;
            transform: scale(1.05);
        }
        
        /* Dialog Box */
        #dialog-box {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            background: linear-gradient(180deg, #fff 0%, #e8e8e8 100%);
            border: 3px solid #333;
            border-radius: 6px;
            padding: 12px 15px;
            display: none;
            z-index: 200;
        }
        
        #dialog-speaker {
            position: absolute;
            top: -12px;
            left: 12px;
            background: #ff6b35;
            color: white;
            font-size: 7px;
            padding: 3px 10px;
            border-radius: 8px;
            border: 2px solid #333;
        }
        
        #dialog-text {
            font-size: clamp(7px, 2vw, 10px);
            line-height: 1.7;
            color: #333;
            min-height: 45px;
            white-space: pre-wrap;
        }
        
        #dialog-indicator {
            position: absolute;
            bottom: 6px;
            right: 12px;
            font-size: 10px;
            animation: bounce 0.5s infinite;
        }
        
        /* Menu */
        #game-menu {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(180deg, #fff 0%, #e8e8e8 100%);
            border: 2px solid #333;
            border-radius: 6px;
            padding: 4px 0;
            display: none;
            z-index: 200;
            min-width: 110px;
        }
        
        .menu-item {
            font-size: clamp(6px, 2vw, 9px);
            padding: 8px 15px;
            cursor: pointer;
            color: #333;
            transition: all 0.1s;
            position: relative;
        }
        
        .menu-item:hover, .menu-item.selected {
            background: #ff6b35;
            color: white;
        }
        
        .menu-item.selected::before {
            content: '▶';
            position: absolute;
            left: 4px;
        }
        
        /* HUD */
        #hud {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #fff;
            border-radius: 6px;
            padding: 6px 10px;
            display: none;
            z-index: 150;
        }
        
        #hud-content {
            font-size: clamp(6px, 1.8vw, 8px);
            color: #fff;
            line-height: 1.5;
        }
        
        /* Battle Screen */
        #battle-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 300;
        }
        
        /* Mobile Controls */
        #mobile-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px 15px;
            padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 500;
            justify-content: space-between;
            align-items: flex-end;
        }
        
        @media (max-width: 800px), (pointer: coarse) {
            #mobile-controls {
                display: flex;
            }
            
            #game-wrapper {
                justify-content: flex-start;
            }
            
            body {
                justify-content: flex-start;
            }
        }
        
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            width: min(150px, 35vw);
            height: min(150px, 35vw);
        }
        
        .dpad-btn {
            width: 100%;
            height: 100%;
            min-width: 44px;
            min-height: 44px;
            background: linear-gradient(145deg, #444, #222);
            border: 2px solid #666;
            border-radius: 10px;
            color: #fff;
            font-size: clamp(16px, 5vw, 24px);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: manipulation;
            cursor: pointer;
        }
        
        .dpad-btn:active {
            background: linear-gradient(145deg, #ff6b35, #c44d22);
            transform: scale(0.92);
        }
        
        .dpad-btn.empty {
            background: transparent;
            border: none;
            min-width: 0;
            min-height: 0;
        }
        
        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            padding-right: 5px;
        }
        
        .action-btn {
            width: min(70px, 18vw);
            height: min(70px, 18vw);
            min-width: 50px;
            min-height: 50px;
            border-radius: 50%;
            border: 3px solid #fff;
            font-size: clamp(12px, 4vw, 18px);
            font-family: 'Press Start 2P', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: manipulation;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .btn-a {
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            color: white;
        }
        
        .btn-b {
            background: linear-gradient(145deg, #3498db, #2980b9);
            color: white;
            width: min(55px, 14vw);
            height: min(55px, 14vw);
        }
        
        .action-btn:active {
            transform: scale(0.9);
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        
        /* Loading */
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        #loading.hidden {
            display: none;
        }
        
        #loading p {
            color: #ff6b35;
            font-size: 10px;
            margin-top: 20px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top-color: #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Landscape mode optimization */
        @media (max-width: 600px) and (orientation: landscape) {
            #game-container {
                border-width: 2px;
            }
            
            #mobile-controls {
                padding: 5px 10px;
            }
            
            .dpad {
                width: min(120px, 30vh);
                height: min(120px, 30vh);
            }
            
            .action-btn {
                width: min(55px, 14vh);
                height: min(55px, 14vh);
            }
            
            .btn-b {
                width: min(45px, 12vh);
                height: min(45px, 12vh);
            }
        }
    </style>
</head>
<body>
    <!-- Focus Overlay -->
    <div id="focus-overlay">
        <div class="play-btn"></div>
        <h2>TOCCA PER GIOCARE</h2>
        <p>Premi per iniziare</p>
    </div>
    
    <!-- Loading Screen -->
    <div id="loading">
        <div class="loading-spinner"></div>
        <p>Caricamento...</p>
    </div>
    
    <!-- Game Wrapper -->
    <div id="game-wrapper">
        <!-- Game Container -->
        <div id="game-container">
            <canvas id="game-canvas" width="480" height="320" tabindex="0"></canvas>
            
            <!-- Title Screen -->
            <div id="title-screen">
                <div class="title-logo">POKÉMONA</div>
                <div class="title-subtitle">Edizione Italiana</div>
                <div class="title-menu">
                    <div class="title-menu-item selected" data-action="new">NUOVA PARTITA</div>
                    <div class="title-menu-item" data-action="continue">CONTINUA</div>
                </div>
            </div>
            
            <!-- HUD -->
            <div id="hud">
                <div id="hud-content"></div>
            </div>
            
            <!-- Menu -->
            <div id="game-menu">
                <div class="menu-item" data-action="team">TEAM</div>
                <div class="menu-item" data-action="bag">ZAINO</div>
                <div class="menu-item" data-action="pokedex">POKÉDEX</div>
                <div class="menu-item" data-action="save">SALVA</div>
                <div class="menu-item" data-action="close">CHIUDI</div>
            </div>
            
            <!-- Dialog -->
            <div id="dialog-box">
                <div id="dialog-speaker"></div>
                <div id="dialog-text"></div>
                <div id="dialog-indicator">▼</div>
            </div>
            
            <!-- Battle Screen -->
            <canvas id="battle-screen" width="480" height="320"></canvas>
        </div>
    </div>
    
    <!-- Mobile Controls -->
    <div id="mobile-controls">
        <div class="dpad">
            <div class="dpad-btn empty"></div>
            <div class="dpad-btn" data-key="ArrowUp">▲</div>
            <div class="dpad-btn empty"></div>
            <div class="dpad-btn" data-key="ArrowLeft">◀</div>
            <div class="dpad-btn empty"></div>
            <div class="dpad-btn" data-key="ArrowRight">▶</div>
            <div class="dpad-btn empty"></div>
            <div class="dpad-btn" data-key="ArrowDown">▼</div>
            <div class="dpad-btn empty"></div>
        </div>
        <div class="action-btns">
            <div class="action-btn btn-a" data-key="Enter">A</div>
            <div class="action-btn btn-b" data-key="Escape">B</div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
