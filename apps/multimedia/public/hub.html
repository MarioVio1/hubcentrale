<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub Centrale</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #141414;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 3.5vw;
      font-weight: 400;
      color: #fff;
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }
    @media (max-width: 800px) {
      h1 { font-size: 6vw; }
    }
    @media (max-width: 500px) {
      h1 { font-size: 7vw; margin-bottom: 25px; }
    }

    .profiles {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      max-width: 900px;
    }
    @media (max-width: 500px) {
      .profiles { gap: 15px; }
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #808080;
      transition: color 0.2s;
      width: 120px;
    }
    .profile:hover { color: #fff; }
    @media (max-width: 500px) {
      .profile { width: 90px; }
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3em;
      border: 3px solid transparent;
      transition: all 0.2s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .profile:hover .avatar {
      border-color: #e5e5e5;
      transform: scale(1.05);
    }
    @media (max-width: 500px) {
      .avatar { width: 90px; height: 90px; font-size: 2.2em; }
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .avatar .initials {
      font-size: 2.5rem;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
    }

    .profile-name {
      margin-top: 12px;
      font-size: 1.1rem;
      text-align: center;
      line-height: 1.2;
      color: inherit;
    }
    @media (max-width: 500px) {
      .profile-name { font-size: 0.85rem; margin-top: 8px; }
    }

    /* Colori avatar per ogni sezione */
    .avatar-multimedia { background: linear-gradient(135deg, #0f171e, #1a3a5c); box-shadow: 0 0 30px rgba(0,168,225,0.3); }
    .avatar-cosmetica { background: linear-gradient(135deg, #2d1b2e, #5c2d5c); box-shadow: 0 0 30px rgba(233,30,99,0.3); }
    .avatar-libri { background: linear-gradient(135deg, #1a2e1a, #2d5c2d); box-shadow: 0 0 30px rgba(76,175,80,0.3); }
    .avatar-lunastar { background: linear-gradient(135deg, #1a1a2e, #2d2d5c); box-shadow: 0 0 30px rgba(156,39,176,0.3); }
    .avatar-manga { background: linear-gradient(135deg, #2e1a1a, #5c2d2d); box-shadow: 0 0 30px rgba(255,152,0,0.3); }
    .avatar-pokemon { background: linear-gradient(135deg, #1a2e2e, #2d5c5c); box-shadow: 0 0 30px rgba(244,67,54,0.3); }
    .avatar-livetv { background: linear-gradient(135deg, #1a1a0e, #5c5c00); box-shadow: 0 0 30px rgba(255,215,0,0.3); }

    .port-info {
      margin-top: 50px;
      color: #333;
      font-size: 0.8rem;
      font-family: monospace;
    }

    .footer-note {
      margin-top: 8px;
      color: #555;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <h1>Chi vuole entrare?</h1>

  <div class="profiles">
    <a href="https://hub-multimedia.vercel.app" class="profile">
      <div class="avatar avatar-multimedia">🎬</div>
      <span class="profile-name">Multimedia<br><small style="font-size:0.75rem;color:#666;">CheRoba</small></span>
    </a>

    <a href="https://hub-cosmetica.vercel.app" class="profile">
      <div class="avatar avatar-cosmetica">💄</div>
      <span class="profile-name">Cosmetica<br><small style="font-size:0.75rem;color:#666;">GlowAI</small></span>
    </a>

    <a href="https://hub-libri.vercel.app" class="profile">
      <div class="avatar avatar-libri">📚</div>
      <span class="profile-name">LibriFree<br><small style="font-size:0.75rem;color:#666;">Libreria free</small></span>
    </a>

    <a href="https://hub-lunastar.vercel.app" class="profile">
      <div class="avatar avatar-lunastar">🎮</div>
      <span class="profile-name">LunaStar<br><small style="font-size:0.75rem;color:#666;">Game Hub</small></span>
    </a>

    <a href="https://hub-manga.vercel.app" class="profile">
      <div class="avatar avatar-manga">📖</div>
      <span class="profile-name">Manga<br><small style="font-size:0.75rem;color:#666;">Mangaflow</small></span>
    </a>

    <a href="https://hub-pokemon.vercel.app" class="profile">
      <div class="avatar avatar-pokemon">⚡</div>
      <span class="profile-name">Pokémon<br><small style="font-size:0.75rem;color:#666;">Veneto</small></span>
    </a>

    <a href="https://hub-livetv.vercel.app" class="profile">
      <div class="avatar avatar-livetv">📺</div>
      <span class="profile-name">LiveTV<br><small style="font-size:0.75rem;color:#666;">DAMI TV</small></span>
    </a>

    <div class="profile" style="cursor:default;opacity:0.3;pointer-events:none;">
      <div class="avatar" style="background:linear-gradient(135deg,#222,#333);font-size:2.5rem;border:3px dashed #555;">+</div>
      <span class="profile-name" style="color:#555;">Altre in arrivo</span>
    </div>
  </div>

  <div class="port-info">
    <span>Tutti i servizi sono su Vercel</span>
  </div>
</body>
</html>
