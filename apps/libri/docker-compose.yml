version: '3.8'

services:
  librivault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: librivault
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./db/custom.db
    volumes:
      # Persist database
      - ./db:/app/db
      # Persist uploaded books
      - ./public/uploads:/app/public/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - librivault-network

networks:
  librivault-network:
    driver: bridge

volumes:
  librivault-db:
  librivault-uploads:
